<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeTracker - Pastel Edition</title>
    
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load("current", {packages:["corechart"]});
    </script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 24px rgba(0, 0, 0, 0.05); 
            --text-color: #444444;
            --app-bg: linear-gradient(135deg, #FFF5F5 0%, #F0F4FF 40%, #E8F9FF 70%, #F5EFFF 100%);
            --accent-color: #4A90E2;
            --danger-color: #FF6B6B;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--app-bg); background-attachment: fixed;
            color: var(--text-color); min-height: 100vh;
            display: flex; justify-content: center; padding: 20px;
        }

        #app-container { width: 100%; max-width: 400px; position: relative; }

        .screen { display: none; flex-direction: column; gap: 15px; }
        .screen.active { display: flex; animation: fadeInScale 0.35s ease-out forwards; }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .logo-container { display: flex; flex-direction: column; align-items: center; margin-top: 20px; margin-bottom: 30px; }
        .logo-container img { width: 250px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.08)); border-radius: 24px; }

        h1 { font-size: 28px; font-weight: 700; color: #333; margin-bottom: 4px; letter-spacing: -0.5px; }
        h2 { text-align: center; font-size: 20px; margin-bottom: 10px; color: #555; font-weight: 600; }
        .subtitle { color: #888; font-size: 15px; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; box-shadow: var(--glass-shadow);
        }

        .btn {
            background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 16px;
            padding: 16px; color: #444; font-size: 17px; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; text-align: center; width: 100%; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .btn:active { transform: scale(0.97); background: #f8f8f8; }

        .btn-filter { padding: 10px 16px; font-size: 14px; border-radius: 14px; margin-bottom: 15px; width: auto; align-self: center; }

        .btn-back {
            background: transparent; border: none; color: var(--accent-color); font-size: 16px; font-weight: 500;
            text-align: left; margin-bottom: 5px; width: auto; box-shadow: none; padding: 5px 0;
        }

        /* Proyectos */
        .project-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 5px; border-bottom: 1px solid rgba(0,0,0,0.05); font-weight: 500; }
        .btn-delete-project { color: var(--danger-color); font-size: 20px; font-weight: bold; cursor: pointer; padding: 0 10px; }

        /* Controles Horas */
        .hours-control-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 5px 0 15px 0; }
        .btn-icon {
            background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 50%;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: var(--accent-color); cursor: pointer;
        }

        /* Calendario */
        .calendar-card { background: rgba(255, 255, 255, 0.7); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 600; color: #444; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; margin: auto; border-radius: 50%; font-size: 15px; cursor: pointer; }
        .day.selected { background: var(--accent-color); color: white; font-weight: 600; }

        /* Historial */
        .history-item { padding: 16px 10px; border-bottom: 1px solid rgba(0,0,0,0.06); }
        .line-1 { display: flex; justify-content: space-between; font-weight: 700; color: #333; font-size: 16px; margin-bottom: 6px; align-items: center; }
        .line-2 { display: flex; justify-content: space-between; color: #888; font-size: 13px; font-weight: 500; }
        
        .edit-hours-control {
            display: flex; align-items: center; gap: 8px; background: #fff; padding: 4px 8px; border-radius: 20px; border: 1px solid #ddd;
        }
        .btn-edit { background: #f8f8f8; border: 1px solid #eee; width: 30px; height: 30px; border-radius: 50%; color: var(--accent-color); font-weight: bold; cursor: pointer; }

        select, input[type="text"] { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.7); margin-bottom: 15px; outline: none; }
        .hours-display { text-align: center; font-size: 34px; font-weight: 700; color: var(--accent-color); min-width: 120px;}
        .chart-container { width: 100%; height: 300px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="screen-home" class="screen active">
        <div class="logo-container">
            <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3589/3589030.png'">
            <h1>TimeTracker</h1>
            <span class="subtitle">Imputación Horas</span>
        </div>
        <button class="btn" onclick="navTo('screen-projects')">Proyectos</button>
        <button class="btn" onclick="navTo('screen-imputar')">Imputar horas</button>
        <button class="btn" onclick="navTo('screen-historial')">Ver horas imputadas</button>
        <button class="btn" onclick="navTo('screen-grafico')">Gráfico</button>
    </div>

    <div id="screen-projects" class="screen">
        <button class="btn btn-back" onclick="navTo('screen-home')">← Inicio</button>
        <h2>Mis Proyectos</h2>
        <div class="glass-panel">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="new-project-input" placeholder="Nombre del proyecto...">
                <button class="btn" style="width: auto; padding: 14px 20px;" onclick="addProject()">+</button>
            </div>
            <div id="projects-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="screen-imputar" class="screen">
        <button class="btn btn-back" onclick="navTo('screen-home')">← Inicio</button>
        <h2>Nueva Imputación</h2>
        <div class="glass-panel">
            <label style="font-size:12px; font-weight:bold; color:#999;">PROYECTO</label>
            <select id="select-project" onchange="updateTasks()"></select>
            <label style="font-size:12px; font-weight:bold; color:#999;">TAREA</label>
            <select id="select-task"></select>
            <label style="font-size:12px; font-weight:bold; color:#999;">FECHAS</label>
            <div class="calendar-card">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)">❮</button>
                    <span id="calendar-month-year"></span>
                    <button onclick="changeMonth(1)">❯</button>
                </div>
                <div class="calendar-grid" id="calendar-days"></div>
            </div>
            <div id="selected-dates" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;"></div>
            <label style="font-size:12px; font-weight:bold; color:#999;">HORAS POR DÍA</label>
            <div class="hours-control-container">
                <button class="btn-icon" onclick="adjustHours(-0.25)">-</button>
                <div class="hours-display" id="hours-display">1h 00m</div>
                <button class="btn-icon" onclick="adjustHours(0.25)">+</button>
            </div>
            <input type="range" id="hours-slider" min="0" max="8" step="0.25" value="1" oninput="updateHoursDisplay()" style="width:100%;">
            <button class="btn" onclick="saveHours()" style="margin-top:25px; background: #4A90E2; color: white;">Guardar</button>
        </div>
    </div>

    <div id="screen-historial" class="screen">
        <button class="btn btn-back" onclick="navTo('screen-home')">← Inicio</button>
        <h2>Historial</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn" style="flex: 1; background: #E8F9FF; color: #4A90E2;" onclick="exportJSON()">JSON</button>
            <button class="btn" style="flex: 1; background: #FFF5F5; color: var(--danger-color);" onclick="deleteAllRecords()">Borrar Todo</button>
        </div>
        <button id="toggle-filter" class="btn btn-filter" onclick="toggleSort()">Filtrar por proyectos</button>
        <div class="glass-panel" id="history-list" style="padding: 5px 15px;"></div>
    </div>

    <div id="screen-grafico" class="screen">
        <button class="btn btn-back" onclick="navTo('screen-home')">← Inicio</button>
        <div class="glass-panel"><div id="piechart_3d" class="chart-container"></div></div>
    </div>
</div>

<script>
    let projects = JSON.parse(localStorage.getItem('timeTrackerProjects')) || ["Generales Industria"];
    let loggedHours = JSON.parse(localStorage.getItem('timeTrackerLogs')) || [];
    let selectedDates = [];
    let calMonth = new Date().getMonth();
    let calYear = new Date().getFullYear();
    let currentSort = 'DATE';
    let editingLogId = null;

    function saveData() {
        localStorage.setItem('timeTrackerProjects', JSON.stringify(projects));
        localStorage.setItem('timeTrackerLogs', JSON.stringify(loggedHours));
    }

    function navTo(id) {
        editingLogId = null;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-projects') renderProjects();
        if(id === 'screen-imputar') initImputar();
        if(id === 'screen-historial') renderHistory();
        if(id === 'screen-grafico') drawChart();
    }

    // --- PROYECTOS ---
    function renderProjects() {
        const list = document.getElementById('projects-list');
        list.innerHTML = projects.map(p => `
            <div class="project-item">
                <span>${p}</span>
                ${p !== "Generales Industria" ? `<span class="btn-delete-project" onclick="deleteProject('${p}')">×</span>` : ''}
            </div>
        `).join('');
    }
    function addProject() {
        const input = document.getElementById('new-project-input');
        if(input.value.trim() && !projects.includes(input.value.trim())) {
            projects.push(input.value.trim()); input.value = ''; saveData(); renderProjects();
        }
    }
    // LÓGICA MODIFICADA: Elimina sin pedir confirmación
    function deleteProject(name) {
        projects = projects.filter(p => p !== name);
        saveData();
        renderProjects();
    }

    // --- IMPUTAR ---
    function initImputar() {
        document.getElementById('select-project').innerHTML = projects.map(p => `<option value="${p}">${p}</option>`).join('');
        updateTasks(); renderCalendar(); renderDates();
    }
    function updateTasks() {
        const p = document.getElementById('select-project').value;
        const ts = p === "Generales Industria" ? ["Formación", "Vacaciones", "Departamentales", "Ausencia/Enfermedad", "Implantación BIM", "Implantación ISO"] : ["Dirección Facultativa", "Proyectos", "Gestión subvenciones", "Asistencia Contratación", "Trabajos previos", "Gestiones administrativas", "Coordinación de seguridad y salud"];
        document.getElementById('select-task').innerHTML = ts.map(t => `<option value="${t}">${t}</option>`).join('');
    }
    function adjustHours(d) {
        const s = document.getElementById('hours-slider');
        s.value = Math.max(0, Math.min(8, parseFloat(s.value) + d));
        updateHoursDisplay();
    }
    function updateHoursDisplay() {
        const v = parseFloat(document.getElementById('hours-slider').value);
        document.getElementById('hours-display').innerText = `${Math.floor(v)}h ${(v%1)*60 || '00'}m`;
    }
    function renderCalendar() {
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        document.getElementById('calendar-month-year').innerText = `${monthNames[calMonth]} ${calYear}`;
        const container = document.getElementById('calendar-days'); container.innerHTML = '';
        let firstDay = (new Date(calYear, calMonth, 1).getDay() + 6) % 7;
        for(let i=0; i<firstDay; i++) container.innerHTML += '<div></div>';
        for(let i=1; i<=new Date(calYear, calMonth+1, 0).getDate(); i++){
            const fullDate = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            container.innerHTML += `<div class="day ${selectedDates.includes(fullDate)?'selected':''}" onclick="toggleDate('${fullDate}')">${i}</div>`;
        }
    }
    function changeMonth(d) { calMonth += d; if(calMonth<0){calMonth=11; calYear--;} else if(calMonth>11){calMonth=0; calYear++;} renderCalendar(); }
    function toggleDate(d) {
        selectedDates = selectedDates.includes(d) ? selectedDates.filter(x => x !== d) : [...selectedDates, d];
        renderCalendar(); renderDates();
    }
    function renderDates() {
        document.getElementById('selected-dates').innerHTML = selectedDates.map(d => `<div class="date-chip" style="background:#fff; padding:5px 10px; border-radius:10px; border:1px solid #eee;">${d.split('-').reverse().join('/')} <span onclick="toggleDate('${d}')">×</span></div>`).join('');
    }
    function saveHours() {
        const v = parseFloat(document.getElementById('hours-slider').value);
        if(v <= 0 || selectedDates.length === 0) return alert("Faltan datos");
        selectedDates.forEach(d => loggedHours.push({ id: String(Date.now() + Math.random()), project: document.getElementById('select-project').value, task: document.getElementById('select-task').value, date: d, hoursVal: v }));
        saveData(); navTo('screen-home');
    }

    // --- HISTORIAL ---
    function renderHistory() {
        const container = document.getElementById('history-list');
        if(loggedHours.length === 0) { container.innerHTML = '<p style="text-align:center; padding:20px;">Vacío</p>'; return; }
        let data = [...loggedHours];
        if(currentSort === 'DATE') data.sort((a,b) => b.date.localeCompare(a.date));
        else data.sort((a,b) => a.project.localeCompare(b.project) || b.hoursVal - a.hoursVal);

        container.innerHTML = data.map(log => {
            const isEditing = editingLogId === String(log.id);
            return `
                <div class="history-item">
                    <div class="line-1">
                        <span>${log.date.split('-').reverse().join('/')}</span>
                        ${isEditing ? `
                            <div class="edit-hours-control">
                                <button class="btn-edit" onclick="updateLogHours('${log.id}', -0.25)">-</button>
                                <span style="min-width:60px; text-align:center;">${formatTime(log.hoursVal)}</span>
                                <button class="btn-edit" onclick="updateLogHours('${log.id}', 0.25)">+</button>
                                <button class="btn-edit" style="background:#4A90E2; color:white;" onclick="stopEdit()">✓</button>
                            </div>
                        ` : `<span style="color:#4A90E2; cursor:pointer;" onclick="startEdit('${log.id}')">${formatTime(log.hoursVal)}</span>`}
                    </div>
                    <div class="line-2"><span style="color:#4A90E2;">${log.project}</span><span>${log.task}</span></div>
                </div>
            `;
        }).join('');
    }

    function startEdit(id) { editingLogId = String(id); renderHistory(); }
    function stopEdit() { editingLogId = null; renderHistory(); }
    function updateLogHours(id, d) {
        const log = loggedHours.find(l => String(l.id) === String(id));
        if(log) { log.hoursVal = Math.max(0, Math.min(8, log.hoursVal + d)); saveData(); renderHistory(); }
    }
    function formatTime(v) { return `${Math.floor(v)}h ${(v%1)*60 || '00'}m`; }
    function toggleSort() { currentSort = currentSort === 'DATE' ? 'PROJECT' : 'DATE'; renderHistory(); }
    function exportJSON() {
        const blob = new Blob([JSON.stringify(loggedHours, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'horas.json'; a.click();
    }
    function deleteAllRecords() { if(confirm("¿Borrar todo?")) { loggedHours = []; saveData(); renderHistory(); } }

    // --- GRÁFICO ---
    function drawChart() {
        let sums = {}; loggedHours.forEach(l => sums[l.project] = (sums[l.project] || 0) + l.hoursVal);
        let data = google.visualization.arrayToDataTable([['Proyecto', 'Horas'], ...Object.entries(sums)]);
        new google.visualization.PieChart(document.getElementById('piechart_3d')).draw(data, { is3D: true, backgroundColor: 'transparent', chartArea: {width:'100%', height:'80%'}, legend:{position:'bottom'} });
    }

    updateHoursDisplay();
</script>
</body>
</html>
