<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="logo.png">
    
    <title>iHoras</title>
    
    <style>
        /* Paleta iOS Moderna y Estilos Base */
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-muted: #8E8E93;
            --ios-blue: #007AFF;
            --ios-gray: #C7C7CC;
            --danger: #FF3B30;
            --success: #34C759;
            
            --pastel-blue: #DFEDF4;
            --pastel-gray: #EAEAEB;
            --pastel-green: #E1F0D7;
            --pastel-yellow: #FFF1CD;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            /* Tipografía esbelta y ligera */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            font-weight: 300; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; justify-content: center;
        }

        #app-container {
            width: 100%; max-width: 430px; min-height: 100vh;
            background: #FAFAFC; position: relative;
            padding: 20px 24px; overflow-x: hidden;
        }

        .screen { display: none; flex-direction: column; padding-bottom: 40px; }
        .screen.active { display: flex; animation: fadeSlideIn 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

        /* Centrado Vertical de la pantalla de inicio */
        #screen-home {
            justify-content: center;
            min-height: 85vh; 
            padding-bottom: 10vh; 
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .large-title {
            font-size: 40px; font-weight: 300; line-height: 1.1;
            letter-spacing: -1.2px; margin-top: 10px; margin-bottom: 40px; color: #000;
        }
        .page-title { font-size: 32px; font-weight: 400; letter-spacing: -0.8px; margin-bottom: 20px; }

        /* NavBar con separación general de 35px para que haya hueco hasta el título */
        .nav-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 35px; padding-top: 10px; }
        .btn-back {
            background: none; border: none; color: var(--ios-blue);
            font-size: 17px; font-weight: 400; display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 5px 0;
        }
        .btn-back:active { opacity: 0.5; }
        .btn-back svg { fill: currentColor; width: 12px; height: 20px; }

        /* INICIO (GRID) */
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .home-card {
            position: relative;
            border-radius: 28px; padding: 24px 20px; display: flex; flex-direction: column;
            align-items: flex-start; justify-content: space-between; text-align: left; cursor: pointer;
            transition: transform 0.2s; min-height: 140px; border: 1px solid rgba(0,0,0,0.02);
        }
        .home-card:active { transform: scale(0.95); }
        .home-card span { font-size: 17px; font-weight: 400; color: rgba(0,0,0,0.8); margin-top: 15px;}
        
        .icon-circle {
            background: #ffffff; width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            align-self: center; /* Centra el icono horizontalmente en la tarjeta */
        }

        .card-number {
            position: absolute;
            top: 24px; right: 20px;
            font-size: 20px; font-weight: 500; 
            color: rgba(0,0,0,0.4);
        }

        .bg-blue { background-color: var(--pastel-blue); }
        .bg-gray { background-color: var(--pastel-gray); }
        .bg-green { background-color: var(--pastel-green); }
        .bg-yellow { background-color: var(--pastel-yellow); }

        /* Estructura Swipe-to-Action */
        .swipe-container {
            position: relative; overflow: hidden; border-radius: 20px; margin-bottom: 12px;
            background: #FAFAFC; 
        }
        .swipe-actions {
            position: absolute; right: 0; top: 0; bottom: 0; display: flex; z-index: 0;
        }
        .swipe-action {
            color: white; font-weight: 500; font-size: 15px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .swipe-action.delete { background: var(--danger); width: 80px; }
        .swipe-action.edit { background: var(--success); width: 80px; }
        
        .swipe-content {
            position: relative; z-index: 1; transition: transform 0.2s ease-out;
            padding: 22px 20px; display: flex; justify-content: space-between; align-items: center;
            border-radius: 20px; font-size: 17px; font-weight: 400; width: 100%;
        }

        /* PROYECTOS */
        .fab-add {
            background: var(--ios-blue); color: white; border: none; width: 40px; height: 40px;
            border-radius: 50%; font-size: 24px; font-weight: 300; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        .add-project-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-project-bar input { flex: 1; padding: 16px; border-radius: 16px; border: none; background: #EAEAEB; font-size: 17px; outline: none; font-weight:300;}

        /* IMPUTAR */
        select {
            width: 100%; padding: 22px 20px; border-radius: 20px; border: none;
            font-size: 17px; font-weight: 400; margin-bottom: 12px; appearance: none; outline: none; color: #000;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='rgba(0,0,0,0.2)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;
        }

        .calendar-card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-top: 10px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 500; font-size: 17px; color: #000; }
        .calendar-header button { background: none; border: none; color: var(--text-muted); font-size: 18px; padding: 5px 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .day-name { font-size: 13px; font-weight: 400; color: var(--text-muted); margin-bottom: 8px; }
        .day { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; margin: auto; border-radius: 10px; font-size: 17px; cursor: pointer; color: #000; font-weight: 400;}
        .day.selected { background: var(--pastel-green); font-weight: 500; }
        .day.empty { visibility: hidden; }

        .hours-header { display: flex; justify-content: flex-end; align-items: center; font-size: 17px; margin-bottom: 15px; }
        .hours-val { font-weight: 500; color: #000; font-size: 20px;}
        
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin-bottom: 15px; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%;
            background: #FFF; cursor: pointer; margin-top: -12px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); border: 1px solid rgba(0,0,0,0.05);
        }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #E5E5EA; border-radius: 3px; }

        .btn-primary {
            background: var(--ios-gray);
            color: #fff; border: none; border-radius: 30px; padding: 18px;
            font-size: 17px; font-weight: 500; width: 100%; cursor: pointer;
            margin-top: 10px; transition: background 0.3s, transform 0.1s;
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        .btn-secondary {
            background: #EAEAEB; color: #000; border: none; border-radius: 14px;
            padding: 12px 16px; font-size: 15px; font-weight: 400; cursor: pointer;
        }

        /* HISTORIAL */
        .history-content { background: var(--pastel-blue); display: block;}
        .line-1 { display: flex; justify-content: space-between; font-weight: 500; font-size: 17px; margin-bottom: 4px; align-items: center; }
        .line-2 { display: flex; justify-content: space-between; color: rgba(0,0,0,0.6); font-size: 14px; font-weight: 300;}
        
        .bottom-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; border-top: 1px solid #EAEAEB; padding-top: 20px;}
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="screen-home" class="screen active">
        <h1 class="large-title">Hey!<br>¿Has metido<br>ya las horas?</h1>
        
        <div class="home-grid">
            <div class="home-card bg-blue" onclick="navTo('screen-projects')">
                <div class="icon-circle">🗂️</div>
                <div class="card-number" id="home-count-projects">0</div>
                <span>Mis proyectos</span>
            </div>
            <div class="home-card bg-gray" onclick="navTo('screen-historial')">
                <div class="icon-circle">📋</div>
                <div class="card-number" id="home-count-hours">0h</div>
                <span>Mis horas</span>
            </div>
            <div class="home-card bg-green" onclick="navTo('screen-imputar')">
                <div class="icon-circle">📝</div>
                <span>Imputar horas</span>
            </div>
            <div class="home-card bg-yellow" id="days-left-card" style="cursor: default; justify-content: flex-start;">
                </div>
        </div>
    </div>

    <div id="screen-projects" class="screen">
        <div class="nav-bar">
            <button class="btn-back" onclick="navTo('screen-home')">
                <svg viewBox="0 0 12 20"><path d="M10 20a1 1 0 0 1-.707-.293l-8-8a1 1 0 0 1 0-1.414l8-8a1 1 0 1 1 1.414 1.414L3.414 10l7.293 7.293A1 1 0 0 1 10 20z"/></svg>Atrás
            </button>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 class="page-title" style="margin-bottom: 0;">Mis proyectos</h1>
            <button class="fab-add" onclick="toggleAddProject()">+</button>
        </div>

        <div id="add-project-container" class="add-project-bar" style="display: none;">
            <input type="text" id="new-project-input" placeholder="Nombre del proyecto...">
            <button class="btn-secondary" style="background: var(--ios-blue); color: white;" onclick="addProject()">Guardar</button>
        </div>

        <div id="projects-list"></div>
    </div>

    <div id="screen-imputar" class="screen">
        <div class="nav-bar" style="margin-bottom: 10px;">
            <button class="btn-back" onclick="cancelImputar()">
                <svg viewBox="0 0 12 20"><path d="M10 20a1 1 0 0 1-.707-.293l-8-8a1 1 0 0 1 0-1.414l8-8a1 1 0 1 1 1.414 1.414L3.414 10l7.293 7.293A1 1 0 0 1 10 20z"/></svg>Atrás
            </button>
        </div>
        
        <h1 class="page-title" id="imputar-title">Imputar Horas</h1>
        
        <select id="select-project" class="bg-blue" onchange="updateTasks()"></select>
        <select id="select-task" class="bg-green"></select>

        <div class="calendar-card">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">❮</button>
                <span id="calendar-month-year"></span>
                <button onclick="changeMonth(1)">❯</button>
            </div>
            <div class="calendar-grid">
                <div class="day-name">Su</div><div class="day-name">Mo</div><div class="day-name">Tu</div>
                <div class="day-name">We</div><div class="day-name">Th</div><div class="day-name">Fr</div><div class="day-name">Sa</div>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>

        <div class="hours-header">
            <span class="hours-val" id="hours-display">4h</span>
        </div>
        
        <input type="range" id="hours-slider" min="0" max="8" step="0.25" value="4" oninput="updateHoursDisplay()">
        <div style="display: flex; justify-content: space-between; color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
        </div>

        <button class="btn-primary" id="btn-imputar" disabled onclick="saveHours()">IMPUTAR</button>
    </div>

    <div id="screen-historial" class="screen">
        <div class="nav-bar">
            <button class="btn-back" onclick="navTo('screen-home')">
                <svg viewBox="0 0 12 20"><path d="M10 20a1 1 0 0 1-.707-.293l-8-8a1 1 0 0 1 0-1.414l8-8a1 1 0 1 1 1.414 1.414L3.414 10l7.293 7.293A1 1 0 0 1 10 20z"/></svg>Atrás
            </button>
        </div>
        <h1 class="page-title">Mis Horas</h1>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button id="toggle-filter" class="btn-secondary" style="background: white; border: 1px solid #EAEAEB;" onclick="toggleSort()">Filtrar proyectos</button>
            <div style="font-size: 17px; font-weight: 400;">
                Total: <span id="total-hours-display" style="color: var(--ios-blue); font-weight: 500;">0h</span>
            </div>
        </div>

        <div id="history-list"></div>
        
        <div class="bottom-actions">
            <button class="btn-secondary" style="flex: 1; min-width: 45%;" onclick="exportJSON()">↓ Exportar JSON</button>
            <button class="btn-secondary" style="flex: 1; min-width: 45%; color: var(--danger); background: #FFEBEB;" onclick="deleteAllRecords()">Borrar Todo</button>
            
            <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importJSON(event)">
            <button class="btn-secondary" style="width: 100%; margin-top: 5px; background: #DFEDF4; color: var(--ios-blue);" onclick="document.getElementById('import-file').click()">↑ Abrir JSON</button>
        </div>
    </div>

</div>

<script>
    // --- ESTADO ---
    let projects = JSON.parse(localStorage.getItem('timeTrackerProjects')) || ["Generales Industria"];
    let loggedHours = JSON.parse(localStorage.getItem('timeTrackerLogs')) || [];
    let selectedDates = [];
    let calMonth = new Date().getMonth();
    let calYear = new Date().getFullYear();
    let currentSort = 'DATE';
    
    let isEditingMode = false;
    let editingRecordId = null;

    const pastelClasses = ['bg-blue', 'bg-green', 'bg-yellow', 'bg-gray'];

    function saveData() {
        localStorage.setItem('timeTrackerProjects', JSON.stringify(projects));
        localStorage.setItem('timeTrackerLogs', JSON.stringify(loggedHours));
        updateHomeStats(); 
    }
    
    function updateHomeStats() {
        // Actualizar contadores
        document.getElementById('home-count-projects').innerText = projects.length;
        const totalHours = loggedHours.reduce((sum, log) => sum + log.hoursVal, 0);
        document.getElementById('home-count-hours').innerText = Math.floor(totalHours) + 'h';

        // Lógica cuenta atrás final de mes laboral
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const year = today.getFullYear();
        const month = today.getMonth();
        let lastDay = new Date(year, month + 1, 0); // Último día natural del mes
        lastDay.setHours(0, 0, 0, 0);

        // Si es fin de semana, retrasar al viernes
        const dayOfWeek = lastDay.getDay();
        if (dayOfWeek === 6) lastDay.setDate(lastDay.getDate() - 1); // Sábado
        else if (dayOfWeek === 0) lastDay.setDate(lastDay.getDate() - 2); // Domingo

        const diffTime = lastDay - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        const card = document.getElementById('days-left-card');
        
        // Estilo de fuente común para los mensajes de la tarjeta
        const baseStyle = "font-size:24px; font-weight:300; line-height:1.1; letter-spacing:-0.5px; margin-top:0; color:#000;";

        if (diffDays > 1) {
            card.innerHTML = `<span style="${baseStyle}">Te quedan<br>${diffDays} días</span>`;
        } else if (diffDays === 1) {
            card.innerHTML = `<span style="${baseStyle}">Solo te queda<br>1 día</span>`;
        } else if (diffDays === 0) {
            // Mensaje en NEGRO y fuente ESTILIZADA
            card.innerHTML = `<span style="${baseStyle} font-weight:400;">¡Es hoy!<br>¡Es hoy!</span>`;
        } else {
             card.innerHTML = `<span style="${baseStyle} color:var(--text-muted);">Mes<br>cerrado</span>`;
        }
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-projects') renderProjects();
        if(id === 'screen-imputar' && !isEditingMode) initImputar(); 
        if(id === 'screen-historial') renderHistory();
        if(id === 'screen-home') updateHomeStats();
    }

    // --- LOGICA DE NAVEGACIÓN (ATRAS EN IMPUTAR) ---
    function cancelImputar() {
        if(isEditingMode) {
            isEditingMode = false;
            editingRecordId = null;
            navTo('screen-historial');
        } else {
            navTo('screen-home');
        }
    }

    // --- SWIPE LOGIC (Touch Tracker nativo) ---
    function initSwipes() {
        const swipables = document.querySelectorAll('.swipe-content');
        
        swipables.forEach(el => {
            let startX = 0, startY = 0;
            let isSwiping = false, isVertical = false;
            const container = el.parentElement;
            const actionsBlock = container.querySelector('.swipe-actions');
            if(!actionsBlock) return;
            const actionsWidth = actionsBlock.offsetWidth;

            el.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isSwiping = true;
                isVertical = false;
                el.style.transition = 'none';
                
                document.querySelectorAll('.swipe-content').forEach(other => {
                    if (other !== el) other.style.transform = 'translateX(0)';
                });
            }, {passive: true});

            el.addEventListener('touchmove', e => {
                if (!isSwiping) return;
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;

                if (!isVertical && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) {
                    isVertical = true; 
                }

                if (!isVertical && dx < 0 && dx > -actionsWidth - 30) {
                    el.style.transform = `translateX(${dx}px)`;
                    if(e.cancelable) e.preventDefault(); 
                }
            }, {passive: false});

            el.addEventListener('touchend', e => {
                isSwiping = false;
                el.style.transition = 'transform 0.25s cubic-bezier(0.25, 1, 0.5, 1)';
                const dx = e.changedTouches[0].clientX - startX;
                
                if (!isVertical && dx < -actionsWidth / 2) {
                    el.style.transform = `translateX(${-actionsWidth}px)`;
                } else {
                    el.style.transform = 'translateX(0)'; 
                }
            });
        });
    }

    // --- PROYECTOS ---
    function toggleAddProject() {
        const el = document.getElementById('add-project-container');
        el.style.display = el.style.display === 'none' ? 'flex' : 'none';
    }

    function renderProjects() {
        const list = document.getElementById('projects-list');
        list.innerHTML = projects.map((p, index) => {
            const colorClass = pastelClasses[index % pastelClasses.length];
            const isDefault = p === "Generales Industria";
            
            if (isDefault) {
                return `<div class="project-item ${colorClass}" style="border-radius: 20px; padding: 22px 20px; margin-bottom: 12px;"><span>${p}</span></div>`;
            } else {
                return `
                <div class="swipe-container">
                    <div class="swipe-actions">
                        <div class="swipe-action delete" onclick="deleteProject('${p}')">Eliminar</div>
                    </div>
                    <div class="swipe-content ${colorClass}">
                        <span>${p}</span>
                        <span style="color: rgba(0,0,0,0.2);">‹‹</span>
                    </div>
                </div>
                `;
            }
        }).join('');
        
        initSwipes(); 
    }

    function addProject() {
        const input = document.getElementById('new-project-input');
        if(input.value.trim() && !projects.includes(input.value.trim())) {
            projects.push(input.value.trim()); 
            input.value = ''; toggleAddProject();
            saveData(); renderProjects();
        }
    }
    
    function deleteProject(name) {
        projects = projects.filter(p => p !== name); saveData(); renderProjects();
    }

    // --- IMPUTAR ---
    function checkImputarBtn() {
        const btn = document.getElementById('btn-imputar');
        if (selectedDates.length > 0) {
            btn.style.background = 'var(--ios-blue)';
            btn.disabled = false;
        } else {
            btn.style.background = 'var(--ios-gray)';
            btn.disabled = true;
        }
    }

    function initImputar() {
        isEditingMode = false;
        editingRecordId = null;
        document.getElementById('imputar-title').innerText = "Imputar Horas";
        
        const btn = document.getElementById('btn-imputar');
        btn.innerText = "IMPUTAR";
        
        document.getElementById('select-project').innerHTML = projects.map(p => `<option value="${p}">Proyecto: ${p}</option>`).join('');
        updateTasks(); 
        
        selectedDates = [];
        calMonth = new Date().getMonth();
        calYear = new Date().getFullYear();
        document.getElementById('hours-slider').value = 4;
        
        renderCalendar(); 
        updateHoursDisplay();
        checkImputarBtn();
    }

    function updateTasks() {
        const select = document.getElementById('select-project');
        const p = select.value.replace('Proyecto: ', ''); 
        const ts = p === "Generales Industria" ? ["Formación", "Vacaciones", "Departamentales", "Ausencia/Enfermedad", "Implantación BIM", "Implantación ISO"] : ["Dirección Facultativa", "Proyectos", "Gestión subvenciones", "Asistencia Contratación", "Trabajos previos", "Gestiones administrativas", "Coordinación de seguridad y salud"];
        document.getElementById('select-task').innerHTML = ts.map(t => `<option value="${t}">Fase: ${t}</option>`).join('');
    }

    function updateHoursDisplay() {
        const v = parseFloat(document.getElementById('hours-slider').value);
        document.getElementById('hours-display').innerText = `${v}h`;
        
        const slider = document.getElementById('hours-slider');
        const percentage = (v / 8) * 100;
        slider.style.background = `linear-gradient(to right, var(--ios-blue) ${percentage}%, #E5E5EA ${percentage}%)`;
    }

    function renderCalendar() {
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        document.getElementById('calendar-month-year').innerText = `${monthNames[calMonth]} ${calYear}`;
        const container = document.getElementById('calendar-days'); container.innerHTML = '';
        
        let firstDay = new Date(calYear, calMonth, 1).getDay();
        for(let i=0; i<firstDay; i++) container.innerHTML += '<div class="day empty"></div>';
        
        for(let i=1; i<=new Date(calYear, calMonth+1, 0).getDate(); i++){
            const fullDate = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const isSelected = selectedDates.includes(fullDate) ? 'selected' : '';
            container.innerHTML += `<div class="day ${isSelected}" onclick="toggleDate('${fullDate}')">${i}</div>`;
        }
    }
    
    function changeMonth(d) { calMonth += d; if(calMonth<0){calMonth=11; calYear--;} else if(calMonth>11){calMonth=0; calYear++;} renderCalendar(); }
    
    function toggleDate(d) {
        selectedDates = selectedDates.includes(d) ? selectedDates.filter(x => x !== d) : [...selectedDates, d];
        renderCalendar();
        checkImputarBtn();
    }
    
    function saveHours() {
        const v = parseFloat(document.getElementById('hours-slider').value);
        if(v <= 0 || selectedDates.length === 0) return;
        
        const p = document.getElementById('select-project').value;
        const t = document.getElementById('select-task').value;

        let returnedToHistory = false;

        if (isEditingMode && editingRecordId) {
            loggedHours = loggedHours.filter(l => String(l.id) !== String(editingRecordId));
            returnedToHistory = true;
        }

        selectedDates.forEach(d => loggedHours.push({ 
            id: String(Date.now() + Math.random()), 
            project: p, task: t, date: d, hoursVal: v 
        }));
        
        saveData(); 
        
        if (returnedToHistory) {
            isEditingMode = false;
            editingRecordId = null;
            navTo('screen-historial');
        } else {
            // Feedback de guardado e inicialización limpia
            const btn = document.getElementById('btn-imputar');
            btn.innerText = "¡GUARDADO!";
            btn.style.background = "var(--success)";
            
            setTimeout(() => {
                initImputar(); 
            }, 1000);
        }
    }

    // --- HISTORIAL ---
    function renderHistory() {
        const container = document.getElementById('history-list');
        const totalContainer = document.getElementById('total-hours-display');
        
        if(loggedHours.length === 0) { 
            container.innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-muted);">Sin registros</p>'; 
            totalContainer.innerText = "0h";
            return; 
        }
        
        let data = [...loggedHours];
        
        const totalHours = data.reduce((sum, log) => sum + log.hoursVal, 0);
        totalContainer.innerText = formatTime(totalHours);
        
        let dailyTotals = {};
        data.forEach(log => {
            dailyTotals[log.date] = (dailyTotals[log.date] || 0) + log.hoursVal;
        });

        if(currentSort === 'DATE') data.sort((a,b) => b.date.localeCompare(a.date));
        else data.sort((a,b) => a.project.localeCompare(b.project) || b.hoursVal - a.hoursVal);

        container.innerHTML = data.map(log => {
            const projClean = log.project.replace('Proyecto: ', '');
            const taskClean = log.task.replace('Fase: ', '');
            
            const totalDay = dailyTotals[log.date];
            let dateColor = '#333';
            if (totalDay === 8) dateColor = 'var(--success)';
            else if (totalDay > 8) dateColor = 'var(--danger)';

            return `
                <div class="swipe-container">
                    <div class="swipe-actions">
                        <div class="swipe-action edit" onclick="loadRecordForEdit('${log.id}')">Editar</div>
                        <div class="swipe-action delete" onclick="deleteSingleRecord('${log.id}')">Eliminar</div>
                    </div>
                    <div class="swipe-content history-content">
                        <div style="width: 100%;">
                            <div class="line-1">
                                <span style="color: ${dateColor}; font-weight: 500;">${log.date.split('-').reverse().join('/')}</span>
                                <span style="color:rgba(0,0,0,0.8); font-weight:500;">${formatTime(log.hoursVal)}</span>
                            </div>
                            <div class="line-2">
                                <span style="color:#000;">${projClean}</span>
                                <span>${taskClean}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        initSwipes();
    }

    function loadRecordForEdit(id) {
        const record = loggedHours.find(l => String(l.id) === String(id));
        if(!record) return;

        isEditingMode = true;
        editingRecordId = id;
        
        document.getElementById('imputar-title').innerText = "Editar Registro";
        document.getElementById('btn-imputar').innerText = "ACTUALIZAR";
        
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-imputar').classList.add('active');
        
        document.getElementById('select-project').value = record.project;
        updateTasks();
        document.getElementById('select-task').value = record.task;
        
        document.getElementById('hours-slider').value = record.hoursVal;
        updateHoursDisplay();
        
        selectedDates = [record.date];
        calYear = parseInt(record.date.split('-')[0]);
        calMonth = parseInt(record.date.split('-')[1]) - 1;
        
        renderCalendar();
        checkImputarBtn();
    }

    function deleteSingleRecord(id) {
        loggedHours = loggedHours.filter(l => String(l.id) !== String(id));
        saveData(); renderHistory();
    }

    function toggleSort() { 
        currentSort = currentSort === 'DATE' ? 'PROJECT' : 'DATE'; 
        document.getElementById('toggle-filter').innerText = currentSort === 'DATE' ? 'Filtrar proyectos' : 'Filtrar fechas';
        renderHistory(); 
    }

    function formatTime(v) { return `${Math.floor(v)}h ${(v%1)*60 || '00'}m`; }
    
    // --- GESTIÓN DE DATOS ---
    function exportJSON() {
        const blob = new Blob([JSON.stringify(loggedHours, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'horas.json'; a.click();
    }
    
    function deleteAllRecords() { 
        if(confirm("¿Borrar TODO? Esta acción no se puede deshacer.")) { 
            loggedHours = []; saveData(); renderHistory(); 
        } 
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    const currentIds = new Set(loggedHours.map(l => String(l.id)));
                    importedData.forEach(log => {
                        if (!currentIds.has(String(log.id))) {
                            loggedHours.push(log);
                        }
                    });
                    saveData();
                    renderHistory();
                    alert("Registros añadidos exitosamente.");
                } else {
                    alert("El archivo no tiene el formato correcto.");
                }
            } catch (err) {
                alert("Error al leer el archivo JSON.");
            }
            event.target.value = ''; 
        };
        reader.readAsText(file);
    }

    // Inicializar visual general
    updateHomeStats();
</script>
</body>
</html>
